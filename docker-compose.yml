# Omniventory — Production compose file
# Pulls the prebuilt multi-arch image from GHCR (no build step here).
# Run with:  docker compose up -d       (pulls ghcr.io/omniventory/omniventory:latest)
# Pin a version:  set IMAGE_TAG=0.1.0 in .env  (defaults to :latest)
# Dev override (build from source instead):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Schema migrations run in a dedicated one-shot `migrate` service
# (`alembic upgrade head`). The `app` service waits for it via
# `depends_on: condition: service_completed_successfully`, so the app starts
# ONLY after migrations succeed; if migrations fail, the app is never started
# (fail-closed). The container entrypoint no longer runs migrations.
#
# Key configuration (override in .env):
#   APP_PORT   Host port that maps to the container's port 8000  (default: 8000)
#   DATA_DIR   Host path for the SQLite bind mount               (default: ./data)
#              The SQLite file will be owned by uid/gid 1000 (the host user)
#              which makes backups straightforward.

services:
  # One-shot migration runner: applies Alembic migrations, then exits.
  # `app` depends on this completing successfully (fail-closed).
  migrate:
    image: ghcr.io/omniventory/omniventory:${IMAGE_TAG:-latest}
    user: "1000:1000"
    command: ["alembic", "upgrade", "head"]
    env_file:
      # Optional: the app is zero-config by default (DATABASE_URL comes from the
      # image, SECRET_KEY auto-generates). Create .env to override.
      - path: .env
        required: false
    volumes:
      - "${DATA_DIR:-./data}:/app/data"
    restart: "no"
    # A one-shot job has no HTTP endpoint to probe.
    healthcheck:
      disable: true

  app:
    image: ghcr.io/omniventory/omniventory:${IMAGE_TAG:-latest}
    restart: unless-stopped
    user: "1000:1000"
    # Start only after migrations have completed successfully (fail-closed).
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    volumes:
      - "${DATA_DIR:-./data}:/app/data"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request, sys; res = urllib.request.urlopen('http://127.0.0.1:8000/api/health'); sys.exit(0 if res.status == 200 else 1)"
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
