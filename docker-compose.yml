# Omniventory — Production compose file
# Uses a prebuilt image (no build step here).
# Run with:  docker compose up -d
# Dev override:  docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up -d --build
#
# Key configuration (override in .env):
#   APP_PORT   Host port that maps to the container's port 8000  (default: 8000)
#   DATA_DIR   Host path for the SQLite bind mount               (default: ./data)
#              The SQLite file will be owned by uid/gid 1000 (the host user)
#              which makes backups straightforward.

services:
  app:
    image: omniventory:latest
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - "${DATA_DIR:-./data}:/app/data"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request, sys; res = urllib.request.urlopen('http://127.0.0.1:8000/api/health'); sys.exit(0 if res.status == 200 else 1)"
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
